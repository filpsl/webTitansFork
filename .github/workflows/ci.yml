name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancela execucoes antigas do mesmo PR/branch quando chega um push novo
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Configura o Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instala dependencias
        run: npm ci

      # Lint informativo: nao bloqueia o merge (ha erros pre-existentes nos
      # componentes do shadcn/ui). Sirva como aviso ate serem tratados.
      - name: Lint
        run: npm run lint
        continue-on-error: true

      # Portao de qualidade: type-check + build de producao do Next.js.
      - name: Build de producao
        run: npm run build
